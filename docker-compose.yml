version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: ai-calling-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - ai-calling-network

  redis:
    image: redis:7-alpine
    container_name: ai-calling-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-calling-network

  backend:
    build: .
    container_name: ai-calling-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password@mongodb:27017/ai-calling-system?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - ai-calling-network
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:

networks:
  ai-calling-network:
    driver: bridge